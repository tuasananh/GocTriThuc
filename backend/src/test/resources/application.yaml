server:
  port: 0 # Uses a random available port for tests to avoid "Address already in use"

spring:
  config:
    # Disable the .env import for tests so we don't rely on local machine secrets
    import: ""

  application:
    name: backend-test

  datasource:
    # No URL/Username/Password needed.
    # @ServiceConnection will inject the Docker container credentials automatically.
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Keep this at validate to ensure Flyway scripts match your Java Entities
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    schemas: public
    # Ensures a clean state if you decide to use the 'clean' feature between tests
    clean-disabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "mock-google-id"
            client-secret: "mock-google-secret"
          github:
            client-id: "mock-github-id"
            client-secret: "mock-github-secret"

app:
  frontend:
    # Dummy URI for testing redirection logic
    oauth2-redirect-uri: http://localhost:5173/dashboard